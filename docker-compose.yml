version: '3.9'
networks:
  jarviis-net:
    driver: bridge
volumes:
  postgres_data: null
  redis_data: null
  visual_baselines: null
services:
  postgres:
    image: postgres:16-alpine
    container_name: jarviis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarviis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarviis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jarviisdb}
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-jarviis}
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: jarviis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD:-redis_secret}
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: jarviis-auth
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    env_file: ./services/auth/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
    - 8001:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/auth:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
  projects:
    build:
      context: ./services/projects
      dockerfile: Dockerfile
    container_name: jarviis-projects
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    env_file: ./services/projects/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
    ports:
    - 8002:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/projects:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
  crawler:
    build:
      context: ./services/crawler
      dockerfile: Dockerfile
    container_name: jarviis-crawler
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8003/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    env_file: ./services/crawler/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/3
    ports:
    - 8003:8003
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/crawler:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    shm_size: 2gb
  ai-orchestrator:
    build:
      context: ./services/ai-orchestrator
      dockerfile: Dockerfile
    container_name: jarviis-ai
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8004/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    env_file: ./services/ai-orchestrator/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/4
    ports:
    - 8004:8004
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/ai-orchestrator:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
  test-executor:
    build:
      context: ./services/test-executor
      dockerfile: Dockerfile
    container_name: jarviis-executor
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8005/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/5
      PROJECTS_SERVICE_URL: http://projects:8002
      INTERNAL_SERVICE_SECRET: jarviis-internal-secret
      MAX_PARALLEL_WORKERS: '4'
      LOG_LEVEL: debug
    ports:
    - 8005:8005
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/test-executor:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload
    shm_size: 2gb
  deploy:
    build:
      context: ./services/deploy
      dockerfile: Dockerfile
    container_name: jarviis-deploy
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8008/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/8
      JWT_SECRET: ${JWT_SECRET:-change_me}
      SECRET_KEY: ${SECRET_KEY:-change_me_32_chars_minimum_xxxxxxx}
      PROJECTS_SERVICE_URL: http://projects:8002
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8008:8008
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/deploy:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8008 --reload
  sso:
    build:
      context: ./services/sso
      dockerfile: Dockerfile
    container_name: jarviis-sso
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8015/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/13
      JWT_SECRET: ${JWT_SECRET:-change_me}
      AUTH_SERVICE_URL: http://auth-service:8001
      APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SSO_BASE_URL: http://sso:8015
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8015:8015
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/sso:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8015 --reload
  mobile:
    build:
      context: ./services/mobile
      dockerfile: Dockerfile
    container_name: jarviis-mobile
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8016/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/14
      PROJECTS_SERVICE_URL: http://projects:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BROWSERSTACK_USERNAME: ${BROWSERSTACK_USERNAME:-}
      BROWSERSTACK_ACCESS_KEY: ${BROWSERSTACK_ACCESS_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8016:8016
    networks:
    - jarviis-net
    volumes:
    - ./services/mobile:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8016 --reload
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: jarviis-prometheus
    restart: unless-stopped
    volumes:
    - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    - ./infra/prometheus/rules:/etc/prometheus/rules
    ports:
    - 9090:9090
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.retention.time=30d
    - --web.enable-lifecycle
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:9090/-/healthy || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  grafana:
    image: grafana/grafana:11.3.0
    container_name: jarviis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-jarviis_admin}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
    - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
    - 3001:3000
    depends_on:
      prometheus:
        condition: service_started
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: jarviis-otel
    restart: unless-stopped
    volumes:
    - ./infra/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
    - 4317:4317
    - 4318:4318
    - 8888:8888
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:13133/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  cobol:
    build:
      context: ./services/cobol
      dockerfile: Dockerfile
    container_name: jarviis-cobol
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8013/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/12
      PROJECTS_SERVICE_URL: http://projects:8002
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8013:8013
    networks:
    - jarviis-net
    volumes:
    - ./services/cobol:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8013 --reload
  billing:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    container_name: jarviis-billing
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8014/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      AUTH_SERVICE_URL: http://auth-service:8001
      APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8014:8014
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/billing:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8014 --reload
  api-tester:
    build:
      context: ./services/api-tester
      dockerfile: Dockerfile
    container_name: jarviis-api-tester
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8009/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/9
      PROJECTS_SERVICE_URL: http://projects:8002
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8009:8009
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/api-tester:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8009 --reload
  security:
    build:
      context: ./services/security
      dockerfile: Dockerfile
    container_name: jarviis-security
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8010/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/10
      PROJECTS_SERVICE_URL: http://projects:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8010:8010
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/security:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8011 --reload
    shm_size: 1gb
  jarviis-ai:
    build:
      context: ./services/jarviis-ai
      dockerfile: Dockerfile
    container_name: jarviis-assistant
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8012/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/11
      PROJECTS_SERVICE_URL: http://projects:8002
      DEPLOY_SERVICE_URL: http://deploy:8008
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8012:8012
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/jarviis-ai:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8012 --reload
  healing:
    build:
      context: ./services/healing
      dockerfile: Dockerfile
    container_name: jarviis-healing
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8006/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jarviis}:${POSTGRES_PASSWORD:-jarviis_secret}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/6
      PROJECTS_SERVICE_URL: http://projects:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8006:8006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/healing:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006 --reload
    shm_size: 1gb
  visual:
    build:
      context: ./services/visual
      dockerfile: Dockerfile
    container_name: jarviis-visual
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8007/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/7
      PROJECTS_SERVICE_URL: http://projects:8002
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8007:8007
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/visual:/app
    - visual_baselines:/tmp/jarviis/baselines
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload
    shm_size: 1gb
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: jarviis-gateway
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    env_file: ./services/api-gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PROJECTS_SERVICE_URL: http://projects:8002
      DEPLOY_SERVICE_URL: http://deploy:8008
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
    - 8000:8000
    depends_on:
      auth-service:
        condition: service_started
      projects:
        condition: service_started
      deploy:
        condition: service_started
    networks:
    - jarviis-net
    volumes:
    - ./services/api-gateway:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: jarviis-frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    ports:
    - 3000:3000
    depends_on:
      api-gateway:
        condition: service_started
    networks:
    - jarviis-net
    volumes:
    - ./frontend:/app
    - /app/node_modules
    - /app/.next
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  nginx:
    image: nginx:alpine
    container_name: jarviis-nginx
    restart: unless-stopped
    ports:
    - 80:80
    volumes:
    - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - frontend
    - api-gateway
    networks:
    - jarviis-net
    healthcheck:
      test:
      - CMD-SHELL
      - nginx -t || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  events:
    build:
      context: ./services/events
      dockerfile: Dockerfile
    container_name: jarviis-events
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8017/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/15
      SERVICE_NAME: events
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVENTS_SERVICE_URL: http://events:8017
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8017:8017
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/events:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8017 --reload
  usage:
    build:
      context: ./services/usage
      dockerfile: Dockerfile
    container_name: jarviis-usage
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8018/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/16
      EVENTS_SERVICE_URL: http://events:8017
      ENVIRONMENT: ${ENVIRONMENT:-development}
      USAGE_SERVICE_URL: http://usage:8018
    ports:
    - 8018:8018
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - jarviis-net
    volumes:
    - ./services/usage:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8018 --reload
  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile
    container_name: jarviis-notifications
    healthcheck:
      test:
