name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: services/auth/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          SECRET_KEY: test_app_secret_key_32chars_minimum
          ENVIRONMENT: test
          GITHUB_CLIENT_ID: ""
          GITHUB_CLIENT_SECRET: ""
          EMAIL_FROM: test@jarviis.ai
        run: pytest app/tests/ -v --tb=short

  events-service:
    name: Events Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/events
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - run: pip install -r requirements.txt
      - run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short

  usage-service:
    name: Usage Service
    runs-on: ubuntu-latest
