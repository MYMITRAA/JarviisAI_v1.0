  projects-service:
    name: Projects Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/projects
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: services/projects/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_projects.db
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          ENVIRONMENT: test
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8005
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
        continue-on-error: true

  all-green:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - auth-service
      - events-service
      - usage-service
      - notifications-service
      - analytics-service
      - reports-service
      - feature-flags-service
      - audit-service
      - search-service
      - compliance-service
      - health-service
      - projects-service
      - frontend
      - security
    steps:
      - run: echo "All CI checks passed"
